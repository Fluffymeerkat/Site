<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Construction</title>
	<link rel="stylesheet" href="assets/style.css">
	<style>
		body {
			min-height: 100vh;
			margin: 0;
			padding-top: 120px;
			padding-bottom: 100px;
			display: flex;
			flex-direction: column;
			align-items: center;
			justify-content: center;
			background: url('assets/images/construction.png') center center / contain no-repeat fixed;
			background-color: #f4f4f4;
		}
		header {
			position: fixed;
			top: 0;
			left: 0;
			right: 0;
			z-index: 999;
			margin-bottom: 2px;
		}
		hr {
			width: 100%;
			margin: 2px 0 0 0;
			border: none;
			height: 2px;
			background: #ddd;
		}
		h2, p {
			text-align: center;
			margin: 0 24px;
		}
		p { max-width: 650px; }
		footer {
			position: fixed;
			bottom: 0;
			left: 0;
			right: 0;
			text-align: center;
			margin: 0;
			padding: 12px 24px;
			background: rgba(255, 255, 255, 0.95);
			border-top: 2px solid #ddd;
			box-sizing: border-box;
		}
		footer p {
			margin: 0;
		}
		@media (max-width: 700px) {
			body { padding-top: 90px; }
		}
	</style>
</head>
<body></body>
<footer>
		<p>&copy; 2024 Fluffy Meerkat. All rights reserved.</p>
	</footer>
<script src="assets/components/navbar.js"></script>
</html>
